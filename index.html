<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經銷商服務系統-精確對位終止版</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-size: 18px; font-weight: bold; color: #666; }
        .tab-btn.active { color: #2196F3; border-bottom: 4px solid #2196F3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; font-size: 16px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { font-size: 18px; padding: 15px; background-color: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #2D5D46; color: white; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 13px; }
        .status-ok { background-color: #e7f5ff; color: #1971c2; }
        .status-wait { background-color: #fff9db; color: #f08c00; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('submit')">支援申請填單</div>
        <div class="tab-btn" onclick="switchTab('search')">案件進度查詢</div>
    </div>

    <section id="submit-section" class="content-section active">
        <form id="orderForm">
            <div class="form-group"><label>經銷商名稱 *</label><input type="text" name="dealerName" required></div>
            <div class="form-group"><label>案件名稱 *</label><input type="text" name="caseName" required></div>
            <div class="form-group"><label>案件地址 *</label><input type="text" name="caseAddress" required></div>
            <div class="form-group"><label>聯絡人姓名 *</label><input type="text" name="dealerContactName" required></div>
            <div class="form-group"><label>聯絡人電話 *</label><input type="tel" name="dealerPhone" required></div>
            <div class="form-group"><label>電子信箱</label><input type="email" name="dealerEmail"></div>
            <div class="form-group"><label>LINE ID</label><input type="text" name="dealerLine"></div>
            <div class="form-group"><label>現場負責姓名 *</label><input type="text" name="siteContactName" required></div>
            <div class="form-group"><label>現場負責電話 *</label><input type="tel" name="sitePhone" required></div>
            <div class="form-group"><label>現場負責信箱</label><input type="email" name="siteEmail"></div>
            <div class="form-group"><label>現場負責 LINE</label><input type="text" name="siteLine"></div>
            <div class="form-group">
                <label>支援工作內容 *</label>
                <select name="workType" required>
                    <option value="VRV 試車">VRV 試車</option>
                    <option value="VRVQ汰換後檢查">VRVQ汰換後檢查</option>
                    <option value="工事巡查">工事巡查</option>
                    <option value="教育訓練">教育訓練</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group"><label>內容詳述 *</label><textarea name="description" rows="3" required></textarea></div>
            <button type="submit" id="submitBtn">提交申請</button>
        </form>
    </section>

    <section id="search-section" class="content-section">
        <div class="form-group"><label>請輸入經銷商名稱</label><input type="text" id="qD" placeholder="例如：和泰大金"></div>
        <div class="form-group"><label>請輸入案件名稱</label><input type="text" id="qC" placeholder="例如：大金空調A"></div>
        <button onclick="queryData()">確認進度查詢</button>
        <div id="results" style="margin-top: 20px;"></div>
    </section>
</div>

<script>
// URL 設定
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=656272806&single=true&output=csv";
const gasUrl = "https://script.google.com/macros/s/AKfycbydkRtSF_FeidEHkgUCStISZv-u07k0SmsaMq6-7twmP714lglPTh7AqUWKdwKvb5czNg/exec";

function switchTab(t) {
    document.querySelectorAll('.tab-btn, .content-section').forEach(el => el.classList.remove('active'));
    if(t === 'search') {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('search-section').classList.add('active');
    } else {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('submit-section').classList.add('active');
    }
}

async function queryData() {
    const dName = document.getElementById('qD').value.trim();
    const cName = document.getElementById('qC').value.trim();
    const res = document.getElementById('results');
    if(!dName || !cName) return alert("請輸入完整名稱");
    
    res.innerHTML = "🔍 資料查詢中...";
    try {
        const response = await fetch(sheetUrl + "&t=" + Date.now());
        const raw = await response.text();
        
        // 解析 CSV 並過濾空行
        const rows = raw.split(/\r?\n/).filter(r => r.trim() !== "").map(r => r.split(",").map(cell => cell.trim().replace(/^"|"$/g, '')));
        
        let found = false;
        let html = `<table><tr><th>案件名稱</th><th>狀態</th><th>排定日期</th><th>負責工程師</th><th>聯絡電話</th></tr>`;

        // 橫向搜索 (從 B 欄 j=1 開始)
        for (let j = 1; j < rows[0].length; j++) {
            // 比對第 2 列 (Index 1) 經銷商 & 第 3 列 (Index 2) 案件
            if (rows[1][j] === dName && rows[2][j] === cName) {
                found = true;
                
                // --- 絕對位移鎖定 ---
                // Google Sheets Row 17 = Array Index 16
                // Google Sheets Row 18 = Array Index 17
                // Google Sheets Row 19 = Array Index 18
                const pDate = rows[16] ? rows[16][j] : ""; 
                const pEng  = rows[17] ? rows[17][j] : ""; 
                const pTel  = rows[18] ? rows[18][j] : ""; 

                // 偵錯用：如果還是抓錯，請按 F12 看控制台輸出
                console.log(`找到案件於第 ${j+1} 欄`);
                console.log("日期列內容:", rows[16][j]); 

                const isDateSet = (pDate && pDate !== "" && pDate !== "undefined");
                const statusStr = isDateSet ? "已排程" : "收件分派中";
                const sClass = isDateSet ? "status-ok" : "status-wait";

                html += `<tr>
                    <td>${rows[2][j]}</td>
                    <td><span class="status-tag ${sClass}">${statusStr}</span></td>
                    <td>${isDateSet ? pDate : "待排程"}</td>
                    <td>${(pEng && pEng !== "undefined") ? pEng : "指派中"}</td>
                    <td>${(pTel && pTel !== "undefined") ? pTel : "--"}</td>
                </tr>`;
            }
        }
        res.innerHTML = found ? html + "</table>" : "<p style='color:red;'>查無資料，請確認輸入名稱是否正確。</p>";
    } catch (e) { 
        console.error(e);
        res.innerHTML = "❌ 連線失敗，請檢查網路。"; 
    }
}

// 提交功能：完全保持現狀，不改動
document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = '提交中...';
    
    const params = new URLSearchParams(new FormData(this)).toString();
    fetch(gasUrl + "?" + params, { method: 'GET', mode: 'no-cors' })
    .then(() => {
        alert("🎉 支援申請已成功送出！");
        this.reset();
        btn.disabled = false;
        btn.innerText = '提交申請';
    })
    .catch(() => {
        alert("提交異常");
        btn.disabled = false;
        btn.innerText = '提交申請';
    });
});
</script>
</body>
</html>
