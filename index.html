<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經銷商服務系統-全欄位校正版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 15px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: bold; color: #888; }
        .tab-btn.active { color: #2196F3; border-bottom: 3px solid #2196F3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; font-size: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { font-size: 18px; padding: 15px; background-color: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: left; }
        th { background-color: #2D5D46; color: white; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-wait { background-color: #fff9db; color: #f08c00; }
        .status-ok { background-color: #e7f5ff; color: #1971c2; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('submit')">支援申請填單</div>
        <div class="tab-btn" onclick="switchTab('search')">案件進度查詢</div>
    </div>

    <section id="submit-section" class="content-section active">
        <form id="orderForm">
            <div class="grid-row">
                <div class="form-group"><label>經銷商名稱 *</label><input type="text" name="經銷商名稱" required></div>
                <div class="form-group"><label>案件名稱 *</label><input type="text" name="案件名稱" required></div>
            </div>
            <div class="form-group"><label>案件地址 *</label><input type="text" name="案件地址" required></div>
            
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;">
                <p style="margin:0 0 10px 0; font-weight:bold; color:#2196F3;">經銷商聯絡人資訊</p>
                <div class="grid-row">
                    <div class="form-group"><label>姓名 *</label><input type="text" name="經銷商聯絡人姓名" required></div>
                    <div class="form-group"><label>電話 *</label><input type="tel" name="經銷商聯絡人電話" required></div>
                </div>
                <div class="grid-row">
                    <div class="form-group"><label>電子信箱</label><input type="email" name="經銷商聯絡人電子信箱"></div>
                    <div class="form-group"><label>LINE ID</label><input type="text" name="經銷商聯絡人 LINE"></div>
                </div>
            </div>

            <div style="background:#fff0f0; padding:10px; border-radius:8px; margin-bottom:15px;">
                <p style="margin:0 0 10px 0; font-weight:bold; color:#e91e63;">現場負責聯絡人</p>
                <div class="grid-row">
                    <div class="form-group"><label>姓名 *</label><input type="text" name="現場負責聯絡人姓名" required></div>
                    <div class="form-group"><label>電話 *</label><input type="tel" name="現場負責人電話" required></div>
                </div>
                <div class="grid-row">
                    <div class="form-group"><label>電子信箱</label><input type="email" name="現場負責人電子信箱"></div>
                    <div class="form-group"><label>LINE ID</label><input type="text" name="現場負責人 LINE"></div>
                </div>
            </div>

            <div class="form-group">
                <label>支援工作內容 *</label>
                <select name="支援工作內容" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="VRV 試車">VRV 試車</option>
                    <option value="VRVQ汰換後檢查">VRVQ汰換後檢查</option>
                    <option value="工事巡查">工事巡查</option>
                    <option value="教育訓練">教育訓練</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group"><label>內容詳述 *</label><textarea name="內容詳述" rows="3" required></textarea></div>
            <button type="submit" id="submitBtn">提交申請</button>
        </form>
    </section>

    <section id="search-section" class="content-section">
        <div class="form-group"><label>請輸入經銷商名稱</label><input type="text" id="qD" placeholder="如：和泰大金"></div>
        <div class="form-group"><label>請輸入案件名稱</label><input type="text" id="qC" placeholder="如：大金空調A"></div>
        <button onclick="queryData()">開始查詢</button>
        <div id="results"></div>
    </section>
</div>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=656272806&single=true&output=csv";
const gasUrl = "https://script.google.com/macros/s/AKfycbydkRtSF_FeidEHkgUCStISZv-u07k0SmsaMq6-7twmP714lglPTh7AqUWKdwKvb5czNg/exec";

function switchTab(t) {
    document.querySelectorAll('.tab-btn, .content-section').forEach(el => el.classList.remove('active'));
    document.getElementById(t + '-section').classList.add('active');
    event.currentTarget.classList.add('active');
}

async function queryData() {
    const d = document.getElementById('qD').value.trim();
    const c = document.getElementById('qC').value.trim();
    const res = document.getElementById('results');
    if(!d || !c) return alert("請輸入完整名稱");
    
    res.innerHTML = "🔍 正在查詢...";
    try {
        const response = await fetch(sheetUrl + "&t=" + Date.now());
        const rawData = await response.text();
        // 解析 CSV 並過濾掉空行
        const rows = rawData.split("\n").filter(r => r.trim() !== "").map(r => r.split(",").map(cell => cell.trim()));
        
        let html = `<table><tr><th>案件名稱</th><th>狀態</th><th>排定日期</th><th>負責工程師</th><th>工程師電話</th></tr>`;
        let found = false;

        // B 欄開始遍歷 (j=1)
        for (let j = 1; j < rows[0].length; j++) {
            // 第 2 列(index 1)是經銷商，第 3 列(index 2)是案件名
            if (rows[1][j] === d && rows[2][j] === c) {
                found = true;
                
                // --- 徹底解決錯位核心：直接根據圖片指定列號 ---
                // image_2e6097 顯示：
                // 列 17 (index 16) 是排定日期
                // 列 18 (index 17) 是負責工程師
                // 列 19 (index 18) 是工程師電話
                const pDate = rows[16] ? rows[16][j] : ""; 
                const pEng  = rows[17] ? rows[17][j] : "";  
                const pTel  = rows[18] ? rows[18][j] : "";  
                
                const statusStr = pDate ? "已排程" : "已收到申請";
                const dateVal = pDate || "尚未排定";
                const engVal = pEng || "指派中";
                const telVal = pTel || "--";
                const sClass = pDate ? "status-ok" : "status-wait";

                html += `<tr>
                    <td>${rows[2][j]}</td>
                    <td><span class="status-tag ${sClass}">${statusStr}</span></td>
                    <td>${dateVal}</td>
                    <td>${engVal}</td>
                    <td>${telVal}</td>
                </tr>`;
            }
        }
        res.innerHTML = found ? html + "</table>" : "<p style='color:red;'>查無資料，請確認輸入是否正確。</p>";
    } catch (e) { res.innerHTML = "❌ 連線異常，請確認試算表發佈設定。"; }
}

document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = '提交中...';
    
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => {
        alert("🎉 提交成功！");
        this.reset();
        btn.disabled = false;
        btn.innerText = '提交申請';
    })
    .catch(() => {
        alert("⚠️ 提交失敗");
        btn.disabled = false;
    });
});
</script>
</body>
</html>
