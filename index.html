<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>經銷商案件進度查詢</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
input, button { font-size: 16px; margin: 5px 0; padding: 5px; }
table { border-collapse: collapse; margin-top: 20px; width: 100%; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
.status-等待派工 { color: green; font-weight: bold; }
.status-排程中 { color: orange; font-weight: bold; }
.status-施工中 { color: blue; font-weight: bold; }
.status-完工 { color: gray; font-weight: bold; }
.progress-bar { height: 16px; background: #eee; border-radius: 8px; overflow: hidden; width: 100%; }
.progress-bar-fill { height: 100%; background: #4CAF50; }
</style>
</head>
<body>

<h2>經銷商案件進度查詢</h2>
<label>請輸入經銷商名稱：</label><br>
<input type="text" id="queryInput" placeholder="例如 王大明公司">
<button onclick="queryData()">查詢</button>

<div id="results"></div>

<script>

// 你的 CSV 連結（已幫你改好）
var sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?output=csv";

async function queryData() {

    var query = document.getElementById('queryInput').value.trim();
    var resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = "查詢中...";

    const response = await fetch(sheetUrl);
    const data = await response.text();
    const rows = data.split("\n").map(row => row.split(","));

    const bodyRows = rows.slice(1);

    let found = false;

    let html = `
    <table>
    <tr>
        <th>案件編號</th>
        <th>案件名稱</th>
        <th>狀態</th>
        <th>收單日期</th>
        <th>排程日期</th>
        <th>負責工程師</th>
        <th>工程師電話</th>
        <th>進度</th>
    </tr>
    `;

    bodyRows.forEach(row => {

        // 經銷商名稱在第2欄 → index 1
        if (row[1] && row[1].trim() === query) {

            found = true;

            let status = row[3]; // 狀態在第4欄 → index 3
            let progressPercent = 0;

            switch(status) {
                case '等待派工': progressPercent = 10; break;
                case '排程中': progressPercent = 40; break;
                case '施工中': progressPercent = 70; break;
                case '完工': progressPercent = 100; break;
            }

            html += `
            <tr>
                <td>${row[0]}</td>
                <td>${row[2]}</td>
                <td class="status-${status}">${status}</td>
                <td>${row[4]}</td>
                <td>${row[5]}</td>
                <td>${row[6]}</td>
                <td>${row[7]}</td>
                <td>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
                    </div>
                </td>
            </tr>
            `;
        }
    });

    html += "</table>";

    if (!found) {
        resultsDiv.innerHTML = "查無資料";
    } else {
        resultsDiv.innerHTML = html;
    }
}

</script>

</body>
</html>
