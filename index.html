<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經銷商服務系統 - 專業版</title>
    <style>
        :root {
            --primary-color: #1A73E8;
            --secondary-color: #2D5D46;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #202124;
            --admin-color: #673AB7;
            --manager-color: #E91E63;
        }

        body { font-family: "Noto Sans TC", sans-serif; padding: 20px; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; }
        
        /* 分頁按鈕 */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e8f0fe; cursor: pointer; border-radius: 8px; font-weight: bold; color: var(--primary-color); transition: 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        /* 區塊切換控制 */
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease; }

        /* 表單區域 */
        .form-section { background: #f1f3f4; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .form-section h3 { margin-top: 0; color: var(--secondary-color); border-left: 5px solid var(--secondary-color); padding-left: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .main-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .main-btn:hover { opacity: 0.9; }

        /* 查詢結果表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f9fa; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-ok { background: #ceead6; color: #0d652d; }
        .status-wait { background: #feefc3; color: #b05a00; }

        /* 問卷區塊 */
        .survey-box { margin-top: 25px; padding: 20px; border: 2px dashed #e67e22; border-radius: 12px; background: #fffbf0; display: none; }
        .score-row { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; }
        .score-item { flex: 1; min-width: 80px; margin: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DAIKIN 經銷商技術服務系統</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-submit" onclick="switchTab('submit')">📋 支援申請</button>
        <button class="tab-btn" id="btn-search" onclick="switchTab('search')">🔍 進度查詢</button>
        <button class="tab-btn" id="btn-admin" onclick="switchTab('admin')">🔒 管理專區</button>
    </div>

    <div id="submit-section" class="content-section active">
        <form id="orderForm">
            <div class="form-section">
                <h3>一、 案件基本資訊</h3>
                <div class="form-grid">
                    <div class="form-group"><label>經銷商名稱 *</label><input type="text" name="dealerName" required></div>
                    <div class="form-group"><label>案件名稱 *</label><input type="text" name="caseName" required></div>
                    <div class="form-group full"><label>案件地址 *</label><input type="text" name="caseAddress" required></div>
                </div>
            </div>

            <div class="form-section">
                <h3>二、 聯絡資訊</h3>
                <div class="form-grid">
                    <div class="form-group"><label>經銷商聯絡人</label><input type="text" name="dealerContactName"></div>
                    <div class="form-group"><label>聯絡電話</label><input type="text" name="dealerPhone"></div>
                    <div class="form-group"><label>Email</label><input type="email" name="dealerEmail"></div>
                    <div class="form-group"><label>LINE ID</label><input type="text" name="dealerLine"></div>
                </div>
                <hr style="border: 0.5px solid #ddd; margin: 15px 0;">
                <div class="form-grid">
                    <div class="form-group"><label>現場聯絡人 *</label><input type="text" name="siteContactName" required></div>
                    <div class="form-group"><label>現場電話 *</label><input type="text" name="sitePhone" required></div>
                    <div class="form-group"><label>現場 Email</label><input type="email" name="siteEmail"></div>
                    <div class="form-group"><label>現場 LINE ID</label><input type="text" name="siteLine"></div>
                </div>
            </div>

            <div class="form-section">
                <h3>三、 支援需求與描述</h3>
                <div class="form-group">
                    <label>支援項目 *</label>
                    <select name="workType" required>
                        <option value="試運轉">試運轉</option>
                        <option value="故障排除">故障排除</option>
                        <option value="技術指導">技術指導</option>
                        <option value="教育培訓">教育培訓</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>內容詳述 *</label>
                    <textarea name="description" rows="4" required placeholder="請詳細說明現場狀況..."></textarea>
                </div>
            </div>
            <button type="submit" class="main-btn" id="submitBtn">提交申請</button>
        </form>
    </div>

    <div id="search-section" class="content-section">
        <div class="form-section" style="background:#e8f0fe;">
            <div class="form-group"><label>經銷商名稱</label><input type="text" id="qD"></div>
            <div class="form-group"><label>案件名稱</label><input type="text" id="qC"></div>
            <button onclick="queryData()" class="main-btn" style="background:#1967d2;">查詢案件進度</button>
        </div>
        <div id="results"></div>

        <div id="integrated-survey" class="survey-box">
            <h3 style="color:#e67e22; margin-top:0;">🌟 服務滿意度回饋</h3>
            <form id="surveyForm">
                <input type="hidden" name="mode" value="survey">
                <input type="hidden" name="sv_dealer" id="sv_dealer">
                <input type="hidden" name="sv_case" id="sv_case">
                <input type="hidden" name="sv_eng" id="sv_eng">
                
                <div class="score-row">
                    <div class="score-item"><label>技術專業</label><select name="scoreTech"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                    <div class="score-item"><label>準時抵達</label><select name="scoreTime"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                    <div class="score-item"><label>配合態度</label><select name="scoreCoord"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                    <div class="score-item"><label>教育內容</label><select name="scoreEdu"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                    <div class="score-item"><label>總體評分</label><select name="scoreOverall"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                </div>
                <div class="form-group"><label>收穫最多的是？</label><textarea name="bestPart" rows="2"></textarea></div>
                <div class="form-group"><label>改進建議</label><textarea name="feedbackMsg" rows="2"></textarea></div>
                <button type="submit" class="main-btn" style="background:#e67e22;">提交回饋問卷</button>
            </form>
        </div>
    </div>

    <div id="admin-section" class="content-section">
        <div id="admin-login" class="form-section" style="text-align:center;">
            <label>請輸入權限密碼</label>
            <input type="password" id="adminPwd" style="max-width:300px; text-align:center; margin-bottom:15px;">
            <button onclick="checkAdmin()" class="main-btn" style="max-width:300px; background:var(--admin-color);">驗證登入</button>
        </div>

        <div id="admin-form" style="display:none;">
            <h3>🛠 工程師案件排程</h3>
            <form id="scheduleForm">
                <input type="hidden" name="mode" value="update">
                <div class="form-grid">
                    <div class="form-group"><label>經銷商名稱</label><input type="text" name="dealerName" required></div>
                    <div class="form-group"><label>案件名稱</label><input type="text" name="caseName" required></div>
                    <div class="form-group"><label>排定日期</label><input type="date" name="pDate" required></div>
                    <div class="form-group"><label>負責工程師</label><input type="text" name="pEng" required></div>
                    <div class="form-group full"><label>電話</label><input type="text" name="pTel"></div>
                </div>
                <button type="submit" class="main-btn" id="updateBtn">確認更新排程</button>
            </form>
        </div>

        <div id="manager-content" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:var(--manager-color);">📈 服務品質監控看板</h3>
                <button onclick="fetchSurveyData()" style="padding:8px 15px; border-radius:5px; background:var(--manager-color); color:white; border:none; cursor:pointer; font-weight:bold;">🔄 更新數據</button>
            </div>
            <div id="surveyList" style="overflow-x:auto;">
                <p style="text-align:center; padding:20px; color:#666;">點擊按鈕載入最新資料...</p>
            </div>
        </div>
    </div>
</div>

<script>
// 設定區
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=656272806&single=true&output=csv";
const gasUrl = "https://script.google.com/macros/s/AKfycbydkRtSF_FeidEHkgUCStISZv-u07k0SmsaMq6-7twmP714lglPTh7AqUWKdwKvb5czNg/exec";
const surveySheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=2027669544&output=csv";

// 分頁切換 (修復連不到問題)
function switchTab(tabId) {
    // 移除所有 active
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    
    // 加入 active
    document.getElementById('btn-' + tabId).classList.add('active');
    document.getElementById(tabId + '-section').classList.add('active');
}

// 密碼驗證
function checkAdmin() {
    var pwd = document.getElementById('adminPwd').value;
    if(pwd === "daikin705") {
        document.getElementById('admin-login').style.display = "none";
        document.getElementById('admin-form').style.display = "block";
    } else if(pwd === "我的小心肝") {
        document.getElementById('admin-login').style.display = "none";
        document.getElementById('manager-content').style.display = "block";
    } else { alert("密碼不正確！"); }
}

// 案件查詢 (橫向讀取邏輯)
async function queryData() {
    const dName = document.getElementById('qD').value.trim();
    const cName = document.getElementById('qC').value.trim();
    const res = document.getElementById('results');
    const surveyBox = document.getElementById('integrated-survey');

    if(!dName || !cName) return alert("請輸入完整名稱");
    res.innerHTML = "<p style='text-align:center;'>🔍 正在同步雲端資料庫...</p>";
    surveyBox.style.display = "none";

    try {
        const response = await fetch(`${sheetUrl}&t=${Date.now()}`);
        const raw = await response.text();
        const rows = raw.split(/\r?\n/).map(r => r.split(",").map(cell => cell.trim().replace(/^"|"$/g, '')));
        
        let found = false;
        let html = `<table><tr><th>案件名稱</th><th>狀態</th><th>排定日期</th><th>負責工程師</th></tr>`;

        for (let i = 1; i < rows.length; i++) {
            if (rows[i][1] === dName && rows[i][2] === cName) {
                found = true;
                const pDate = rows[i][16] || ""; 
                const pEng  = rows[i][17] || ""; 
                const statusHtml = pDate ? '<span class="status-tag status-ok">已排程</span>' : '<span class="status-tag status-wait">分派中</span>';
                
                html += `<tr><td>${rows[i][2]}</td><td>${statusHtml}</td><td>${pDate || '待確認'}</td><td>${pEng || '指派中'}</td></tr>`;
                
                document.getElementById('sv_dealer').value = dName;
                document.getElementById('sv_case').value = cName;
                document.getElementById('sv_eng').value = pEng || "未指派";
                surveyBox.style.display = "block";
            }
        }
        res.innerHTML = found ? html + "</table>" : "<p style='color:red; text-align:center;'>查無案件，請檢查名稱是否正確。</p>";
    } catch (e) { res.innerHTML = "<p>資料庫連線失敗。</p>"; }
}

// 主管載入滿意度
async function fetchSurveyData() {
    const list = document.getElementById('surveyList');
    list.innerHTML = "讀取中...";
    try {
        const response = await fetch(surveySheetUrl + "&t=" + Date.now());
        const raw = await response.text();
        const rows = raw.split(/\r?\n/).map(r => r.split(",").map(cell => cell.trim().replace(/^"|"$/g, '')));
        
        let html = "<table><tr><th>日期</th><th>工程師</th><th>經銷商</th><th>評分</th><th>回饋</th></tr>";
        for(let i=1; i<rows.length; i++){
            if(rows[i][1]){
                html += `<tr><td>${rows[i][0].split(' ')[0]}</td><td>${rows[i][3]}</td><td>${rows[i][1]}</td><td>${rows[i][8]}分</td><td>${rows[i][10] || '-'}</td></tr>`;
            }
        }
        list.innerHTML = html + "</table>";
    } catch (e) { list.innerHTML = "讀取失敗，請確認網路。"; }
}

// 表單提交
document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = '正在傳送...';
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("🎉 支援申請已成功送出！"); this.reset(); btn.disabled = false; btn.innerText = '提交申請'; });
});

document.getElementById('scheduleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('updateBtn');
    btn.disabled = true;
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("✅ 排程更新完成！"); this.reset(); btn.disabled = false; });
});

document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("💖 感謝您的寶貴回饋！"); document.getElementById('integrated-survey').style.display = "none"; });
});
</script>

</body>
</html>
