<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAIKIN 經銷商技術服務系統</title>
    <style>
        :root {
            --primary-color: #1A73E8;
            --secondary-color: #2D5D46;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #202124;
            --admin-color: #673AB7;
            --manager-color: #E91E63;
        }

        body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; padding: 20px; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; }
        
        /* 分頁切換 */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e8f0fe; cursor: pointer; border-radius: 8px; font-weight: bold; color: var(--primary-color); transition: 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 表單樣式 */
        .form-section { background: #f1f3f4; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .form-section h3 { margin-top: 0; color: var(--secondary-color); border-left: 5px solid var(--secondary-color); padding-left: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .main-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .main-btn:hover { opacity: 0.9; }

        /* 表格與狀態 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f9fa; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-ok { background: #ceead6; color: #0d652d; }
        .status-wait { background: #feefc3; color: #b05a00; }

        .survey-box { margin-top: 25px; padding: 20px; border: 2px dashed #e67e22; border-radius: 12px; background: #fffbf0; display: none; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>DAIKIN 經銷商技術服務系統</h1></div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-submit" onclick="switchTab('submit')">📋 支援申請</button>
        <button class="tab-btn" id="btn-search" onclick="switchTab('search')">🔍 進度查詢</button>
        <button class="tab-btn" id="btn-admin" onclick="switchTab('admin')">🔒 管理專區</button>
    </div>

    <div id="submit-section" class="content-section active">
        <form id="orderForm">
            <div class="form-section">
                <h3>一、 案件基本資訊</h3>
                <div class="form-grid">
                    <div class="form-group"><label>經銷商名稱 *</label><input type="text" name="dealerName" required></div>
                    <div class="form-group"><label>案件名稱 *</label><input type="text" name="caseName" required></div>
                    <div class="form-group full"><label>案件地址 *</label><input type="text" name="caseAddress" required></div>
                </div>
            </div>

            <div class="form-section">
                <h3>二、 聯絡資訊</h3>
                <div class="form-grid">
                    <div class="form-group"><label>經銷商聯絡人</label><input type="text" name="dealerContactName"></div>
                    <div class="form-group"><label>聯絡電話</label><input type="text" name="dealerPhone"></div>
                    <div class="form-group"><label>Email</label><input type="email" name="dealerEmail"></div>
                    <div class="form-group"><label>LINE ID</label><input type="text" name="dealerLine"></div>
                </div>
                <hr style="border: 0.5px solid #ddd; margin: 15px 0;">
                <div class="form-grid">
                    <div class="form-group"><label>現場聯絡人 *</label><input type="text" name="siteContactName" required></div>
                    <div class="form-group"><label>現場電話 *</label><input type="text" name="sitePhone" required></div>
                    <div class="form-group"><label>現場 Email</label><input type="email" name="siteEmail"></div>
                    <div class="form-group"><label>現場 LINE ID</label><input type="text" name="siteLine"></div>
                </div>
            </div>

            <div class="form-section">
                <h3>三、 支援需求詳述</h3>
                <div class="form-group">
                    <label>支援項目 *</label>
                    <select name="workType" required>
                        <option value="">請選擇支援項目</option>
                        <option value="VRV試車">VRV試車</option>
                        <option value="VRV Q 汰換前檢查">VRV Q 汰換前檢查</option>
                        <option value="VRV Q 汰換後檢查">VRV Q 汰換後檢查</option>
                        <option value="VRV 案件技術輔導(已有案件，但沒有VRV經驗)">VRV 案件技術輔導(已有案件，但沒有VRV經驗)</option>
                        <option value="教育訓練">教育訓練</option>
                        <option value="工程品質巡檢">工程品質巡檢</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>內容詳述 *</label>
                    <textarea name="description" rows="4" required placeholder="請詳細說明現場狀況或具體需求..."></textarea>
                </div>
            </div>
            <button type="submit" class="main-btn" id="submitBtn">提交申請</button>
        </form>
    </div>

    <div id="search-section" class="content-section">
        <div class="form-section" style="background:#e8f0fe;">
            <div class="form-group"><label>經銷商名稱</label><input type="text" id="qD"></div>
            <div class="form-group"><label>案件名稱</label><input type="text" id="qC"></div>
            <button onclick="queryData()" class="main-btn" style="background:#1967d2;">查詢案件</button>
        </div>
        <div id="results"></div>

        <div id="integrated-survey" class="survey-box">
            <h3 style="color:#e67e22; margin-top:0;">🌟 服務滿意度回饋</h3>
            <form id="surveyForm">
                <input type="hidden" name="mode" value="survey">
                <input type="hidden" name="sv_dealer" id="sv_dealer">
                <input type="hidden" name="sv_case" id="sv_case">
                <input type="hidden" name="sv_eng" id="sv_eng">
                <div class="form-grid">
                    <div class="form-group"><label>技術專業</label><select name="scoreTech"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                    <div class="form-group"><label>總體評分</label><select name="scoreOverall"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div>
                </div>
                <button type="submit" class="main-btn" style="background:#e67e22;">提交回饋</button>
            </form>
        </div>
    </div>

    <div id="admin-section" class="content-section">
        <div id="admin-login" class="form-section" style="text-align:center;">
            <input type="password" id="adminPwd" placeholder="請輸入權限密碼" style="max-width:300px; margin-bottom:15px;"><br>
            <button onclick="checkAdmin()" class="main-btn" style="max-width:300px; background:var(--admin-color);">驗證登入</button>
        </div>
        <div id="admin-form" style="display:none;">
            <h3>🛠 工程師排程管理</h3>
            <form id="scheduleForm">
                <input type="hidden" name="mode" value="update">
                <div class="form-grid">
                    <div class="form-group"><label>經銷商名稱</label><input type="text" name="dealerName" required></div>
                    <div class="form-group"><label>案件名稱</label><input type="text" name="caseName" required></div>
                    <div class="form-group"><label>排定日期</label><input type="date" name="pDate" required></div>
                    <div class="form-group"><label>指派工程師</label><input type="text" name="pEng" required></div>
                </div>
                <button type="submit" class="main-btn" id="updateBtn">更新排程</button>
            </form>
        </div>
        <div id="manager-content" style="display:none;">
             <h3 style="color:var(--manager-color);">📈 服務看板區</h3>
             <div id="surveyList"></div>
        </div>
    </div>
</div>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=656272806&single=true&output=csv";
const gasUrl = "https://script.google.com/macros/s/AKfycbydkRtSF_FeidEHkgUCStISZv-u07k0SmsaMq6-7twmP714lglPTh7AqUWKdwKvb5czNg/exec";

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById('btn-' + tabId).classList.add('active');
    document.getElementById(tabId + '-section').classList.add('active');
}

function checkAdmin() {
    var pwd = document.getElementById('adminPwd').value;
    if(pwd === "daikin705") {
        document.getElementById('admin-login').style.display = "none";
        document.getElementById('admin-form').style.display = "block";
    } else if(pwd === "我的小心肝") {
        document.getElementById('admin-login').style.display = "none";
        document.getElementById('manager-content').style.display = "block";
    } else { alert("密碼錯誤"); }
}

// 查詢邏輯修正：完全對應您的 CSV 欄位順序 (橫向掃描)
async function queryData() {
    const dName = document.getElementById('qD').value.trim();
    const cName = document.getElementById('qC').value.trim();
    const res = document.getElementById('results');
    const surveyBox = document.getElementById('integrated-survey');

    if(!dName || !cName) return alert("請輸入完整名稱");
    res.innerHTML = "🔍 搜尋中...";
    surveyBox.style.display = "none";

    try {
        const response = await fetch(`${sheetUrl}&t=${Date.now()}`);
        const text = await response.text();
        // 解決地址中有逗號的分割問題
        const rows = text.split(/\r?\n/).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

        let found = false;
        let html = `<table><tr><th>案件名稱</th><th>狀態</th><th>日期</th><th>工程師</th></tr>`;

        for (let i = 1; i < rows.length; i++) {
            let row = rows[i].map(c => c.replace(/^"|"$/g, '').trim());
            // row[1] 是經銷商，row[2] 是案件名稱
            if (row[1] === dName && row[2] === cName) {
                found = true;
                const pDate = row[16] || ""; 
                const pEng  = row[17] || ""; 
                const statusStr = pDate ? '<span class="status-tag status-ok">已排程</span>' : '<span class="status-tag status-wait">分派中</span>';
                
                html += `<tr><td>${row[2]}</td><td>${statusStr}</td><td>${pDate || '待定'}</td><td>${pEng || '指派中'}</td></tr>`;
                
                document.getElementById('sv_dealer').value = dName;
                document.getElementById('sv_case').value = cName;
                document.getElementById('sv_eng').value = pEng || "未指派";
                surveyBox.style.display = "block";
            }
        }
        res.innerHTML = found ? html + "</table>" : "<p style='color:red; text-align:center;'>查無資料，請確認名稱是否完全一致。</p>";
    } catch (e) { res.innerHTML = "連線失敗"; }
}

// 表單提交處理
document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = '傳送中...';
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("🎉 申請已送出！"); this.reset(); btn.disabled = false; btn.innerText = '提交申請'; });
});

document.getElementById('scheduleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("✅ 更新成功！"); this.reset(); });
});

document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => { alert("💖 感謝回饋！"); document.getElementById('integrated-survey').style.display = "none"; });
});
</script>
</body>
</html>
