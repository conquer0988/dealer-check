<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經銷商服務系統-全欄位修復版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 18px; font-weight: bold; color: #888; }
        .tab-btn.active { color: #2196F3; border-bottom: 3px solid #2196F3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; font-size: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { font-size: 18px; padding: 15px; background-color: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #2D5D46; color: white; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-scheduled { background-color: #e7f5ff; color: #1971c2; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('submit')">支援申請填單</div>
        <div class="tab-btn" onclick="switchTab('search')">案件進度查詢</div>
    </div>

    <section id="submit-section" class="content-section active">
        <form id="orderForm">
            <div class="grid-row">
                <div class="form-group"><label>經銷商名稱 *</label><input type="text" name="dealerName" required></div>
                <div class="form-group"><label>案件名稱 *</label><input type="text" name="caseName" required></div>
            </div>
            <div class="form-group"><label>案件地址 *</label><input type="text" name="caseAddress" required></div>
            
            <h4 style="margin: 15px 0 10px; color: #2196F3;">▼ 經銷商聯絡資訊</h4>
            <div class="grid-row">
                <div class="form-group"><label>聯絡人姓名 *</label><input type="text" name="dContact" required></div>
                <div class="form-group"><label>聯絡電話 *</label><input type="tel" name="dPhone" required></div>
            </div>
            <div class="grid-row">
                <div class="form-group"><label>電子信箱</label><input type="email" name="dEmail"></div>
                <div class="form-group"><label>LINE ID</label><input type="text" name="dLine"></div>
            </div>

            <h4 style="margin: 15px 0 10px; color: #E91E63;">▼ 現場負責聯絡人</h4>
            <div class="grid-row">
                <div class="form-group"><label>現場負責姓名 *</label><input type="text" name="sContact" required></div>
                <div class="form-group"><label>現場負責電話 *</label><input type="tel" name="sPhone" required></div>
            </div>
            <div class="grid-row">
                <div class="form-group"><label>現場電子信箱</label><input type="email" name="sEmail"></div>
                <div class="form-group"><label>現場 LINE ID</label><input type="text" name="sLine"></div>
            </div>

            <div class="form-group">
                <label>支援工作內容 *</label>
                <select name="workType" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="VRV 試車">VRV 試車</option>
                    <option value="VRVQ汰換後檢查">VRVQ汰換後檢查</option>
                    <option value="工事巡查">工事巡查</option>
                    <option value="教育訓練">教育訓練</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group"><label>內容詳述 *</label><textarea name="description" rows="3" required></textarea></div>
            <button type="submit" id="submitBtn">提交申請</button>
        </form>
    </section>

    <section id="search-section" class="content-section">
        <div class="form-group"><label>經銷商名稱</label><input type="text" id="qD" placeholder="範例：和泰大金"></div>
        <div class="form-group"><label>案件名稱</label><input type="text" id="qC" placeholder="範例：大金空調A"></div>
        <button onclick="queryData()">查詢進度</button>
        <div id="results"></div>
    </section>
</div>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjbJC6VSPPicOPdwTHbcF3ETS5BSJnC_-HIvBNounFVLXik9NxzChJGqackA8HEWcfnkBMjUhWIUmQ/pub?gid=656272806&single=true&output=csv";
const gasUrl = "https://script.google.com/macros/s/AKfycbydkRtSF_FeidEHkgUCStISZv-u07k0SmsaMq6-7twmP714lglPTh7AqUWKdwKvb5czNg/exec";

function switchTab(t) {
    document.querySelectorAll('.tab-btn, .content-section').forEach(el => el.classList.remove('active'));
    document.getElementById(t + '-section').classList.add('active');
    event.currentTarget.classList.add('active');
}

async function queryData() {
    const d = document.getElementById('qD').value.trim();
    const c = document.getElementById('qC').value.trim();
    const res = document.getElementById('results');
    if(!d || !c) return alert("請輸入經銷商與案件名稱");
    
    res.innerHTML = "查詢中...";
    try {
        const response = await fetch(sheetUrl + "&t=" + Date.now());
        const rows = (await response.text()).split("\n").map(r => r.split(","));
        let html = `<table><tr><th>案件</th><th>狀態</th><th>日期</th><th>工程師</th></tr>`;
        let found = false;

        for (let j = 1; j < rows[0].length; j++) {
            if (rows[1][j].includes(d) && rows[2][j].includes(c)) {
                found = true;
                const date = rows[16][j] || "--";
                const eng = rows[17][j] || "指派中";
                html += `<tr><td>${rows[2][j]}</td><td><span class="status-tag ${rows[16][j]?'status-scheduled':''}">OK</span></td><td>${date}</td><td>${eng}</td></tr>`;
            }
        }
        res.innerHTML = found ? html + "</table>" : "查無資料";
    } catch (e) { res.innerHTML = "連線失敗"; }
}

document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = '提交中...';
    
    fetch(gasUrl + "?" + new URLSearchParams(new FormData(this)).toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => {
        alert("🎉 提交成功！");
        this.reset();
        btn.disabled = false;
        btn.innerText = '提交申請';
    })
    .catch(() => {
        alert("提交異常");
        btn.disabled = false;
    });
});
</script>
</body>
</html>
